<svg width="100%" viewBox="0 0 680 1520" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
<title>Genea study creation data flow</title>
<desc>Top-to-bottom diagram following the admin homepage order. Steps 1-4 are one-time prerequisites: set up input codes, create systems, upload videos, upload attention-check videos. Step 5 is the five-part study-creation sequence on the Upload CSV page: validate, read inputs, create study rows, build the page list in the browser, save pages. A final note describes runtime serving by a separate api worker.</desc>

<style>
  .t  { font-size: 14px; font-weight: 400; }
  .ts { font-size: 12px; font-weight: 400; }
  .th { font-size: 14px; font-weight: 500; }
  .c-gray   rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray   .th, .c-gray   .t { fill: #444441; }
  .c-gray   .ts { fill: #5F5E5A; }
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th, .c-purple .t { fill: #3C3489; }
  .c-purple .ts { fill: #534AB7; }
  .c-teal   rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal   .th, .c-teal   .t { fill: #085041; }
  .c-teal   .ts { fill: #0F6E56; }
  .c-amber  rect { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber  .th, .c-amber  .t { fill: #633806; }
  .c-amber  .ts { fill: #854F0B; }
  .c-blue   rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue   .th, .c-blue   .t { fill: #0C447C; }
  .c-blue   .ts { fill: #185FA5; }
  .c-coral  rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral  .th, .c-coral  .t { fill: #712B13; }
  .c-coral  .ts { fill: #993C1D; }
  .arr { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
  text.t, text.ts, text.th { fill: #444441; }
</style>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="th" x="40" y="34">Prerequisites — one-time setup (homepage steps 1–4)</text>
<line x1="40" y1="44" x2="640" y2="44" stroke="#888780" stroke-width="0.5"/>

<!-- ===== 1. Input Codes ===== -->
<g class="c-gray">
<rect x="240" y="60" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="82" text-anchor="middle" dominant-baseline="central">1. Input Codes page</text>
</g>
<line x1="340" y1="104" x2="340" y2="126" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal">
<rect x="240" y="128" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="148" text-anchor="middle" dominant-baseline="central">geneaapi</text>
<text class="ts" x="340" y="166" text-anchor="middle" dominant-baseline="central">PATCH /api/inputcode</text>
</g>
<line x1="340" y1="180" x2="340" y2="202" class="arr" marker-end="url(#arrow)"/>
<g class="c-blue">
<rect x="240" y="204" width="200" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="222" text-anchor="middle" dominant-baseline="central">D1 — inputcode</text>
<text class="ts" x="340" y="240" text-anchor="middle" dominant-baseline="central">UPSERT</text>
</g>

<!-- ===== 2. Systems ===== -->
<g class="c-gray">
<rect x="240" y="288" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="310" text-anchor="middle" dominant-baseline="central">2. Systems page</text>
</g>
<line x1="340" y1="332" x2="340" y2="354" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal">
<rect x="240" y="356" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="376" text-anchor="middle" dominant-baseline="central">geneaapi</text>
<text class="ts" x="340" y="394" text-anchor="middle" dominant-baseline="central">POST /api/systems</text>
</g>
<line x1="340" y1="408" x2="340" y2="430" class="arr" marker-end="url(#arrow)"/>
<g class="c-blue">
<rect x="240" y="432" width="200" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="450" text-anchor="middle" dominant-baseline="central">D1 — systems</text>
<text class="ts" x="340" y="468" text-anchor="middle" dominant-baseline="central">INSERT</text>
</g>

<!-- ===== 3. Upload Videos ===== -->
<g class="c-gray">
<rect x="230" y="516" width="220" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="538" text-anchor="middle" dominant-baseline="central">3. Upload Videos page</text>
</g>
<text class="ts" x="150" y="588">(a) .mp4 file</text>
<text class="ts" x="430" y="588">(b) video metadata</text>
<line x1="320" y1="560" x2="224" y2="598" class="arr" marker-end="url(#arrow)"/>
<line x1="360" y1="560" x2="456" y2="598" class="arr" marker-end="url(#arrow)"/>
<g class="c-purple">
<rect x="120" y="600" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="220" y="620" text-anchor="middle" dominant-baseline="central">upload worker</text>
<text class="ts" x="220" y="638" text-anchor="middle" dominant-baseline="central">POST /upload/videos</text>
</g>
<g class="c-teal">
<rect x="360" y="600" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="460" y="620" text-anchor="middle" dominant-baseline="central">geneaapi</text>
<text class="ts" x="460" y="638" text-anchor="middle" dominant-baseline="central">POST /api/videos</text>
</g>
<line x1="220" y1="652" x2="220" y2="674" class="arr" marker-end="url(#arrow)"/>
<line x1="460" y1="652" x2="460" y2="674" class="arr" marker-end="url(#arrow)"/>
<g class="c-amber">
<rect x="120" y="676" width="200" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="220" y="700" text-anchor="middle" dominant-baseline="central">R2 — videos/...</text>
</g>
<g class="c-blue">
<rect x="360" y="676" width="200" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="460" y="694" text-anchor="middle" dominant-baseline="central">D1 — videos</text>
<text class="ts" x="460" y="712" text-anchor="middle" dominant-baseline="central">INSERT</text>
</g>

<!-- ===== 4. Upload Attention Check ===== -->
<g class="c-gray">
<rect x="210" y="764" width="260" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="786" text-anchor="middle" dominant-baseline="central">4. Upload Attention Check page</text>
</g>
<text class="ts" x="150" y="836">(a) .mp4 file</text>
<text class="ts" x="430" y="836">(b) clip metadata</text>
<line x1="320" y1="808" x2="224" y2="846" class="arr" marker-end="url(#arrow)"/>
<line x1="360" y1="808" x2="456" y2="846" class="arr" marker-end="url(#arrow)"/>
<g class="c-purple">
<rect x="120" y="848" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="220" y="868" text-anchor="middle" dominant-baseline="central">upload worker</text>
<text class="ts" x="220" y="886" text-anchor="middle" dominant-baseline="central">POST /upload/attention-check</text>
</g>
<g class="c-teal">
<rect x="360" y="848" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="460" y="868" text-anchor="middle" dominant-baseline="central">geneaapi</text>
<text class="ts" x="460" y="886" text-anchor="middle" dominant-baseline="central">POST /api/attention-check</text>
</g>
<line x1="220" y1="900" x2="220" y2="922" class="arr" marker-end="url(#arrow)"/>
<path d="M460 900 L460 912 L401 912 L401 922" class="arr" marker-end="url(#arrow)"/>
<path d="M460 900 L460 912 L565 912 L565 922" class="arr" marker-end="url(#arrow)"/>
<g class="c-amber">
<rect x="120" y="924" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="220" y="946" text-anchor="middle" dominant-baseline="central">R2 — videos/...</text>
</g>
<g class="c-blue">
<rect x="326" y="924" width="150" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="401" y="942" text-anchor="middle" dominant-baseline="central">D1 — videos</text>
<text class="ts" x="401" y="960" text-anchor="middle" dominant-baseline="central">INSERT (type='check')</text>
</g>
<g class="c-blue">
<rect x="490" y="924" width="150" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="565" y="942" text-anchor="middle" dominant-baseline="central">D1 — attentioncheck</text>
<text class="ts" x="565" y="960" text-anchor="middle" dominant-baseline="central">INSERT</text>
</g>

<!-- ===== Step 5: Create the study ===== -->
<text class="th" x="40" y="1024">Step 5 — Create the study (Upload CSV page)</text>
<line x1="40" y1="1034" x2="640" y2="1034" stroke="#888780" stroke-width="0.5"/>

<!-- 5.1 Validate -->
<g class="c-coral">
<rect x="60" y="1052" width="60" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="90" y="1074" text-anchor="middle" dominant-baseline="central">5.1</text>
</g>
<g class="c-teal">
<rect x="150" y="1052" width="210" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="255" y="1070" text-anchor="middle" dominant-baseline="central">Validate CSV</text>
<text class="ts" x="255" y="1086" text-anchor="middle" dominant-baseline="central">PATCH /api/{study-key}</text>
</g>
<line x1="360" y1="1074" x2="404" y2="1074" class="arr" marker-end="url(#arrow)"/>
<g class="c-blue">
<rect x="410" y="1052" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="1070" text-anchor="middle" dominant-baseline="central">D1 — videos</text>
<text class="ts" x="510" y="1086" text-anchor="middle" dominant-baseline="central">SELECT</text>
</g>
<line x1="90" y1="1096" x2="90" y2="1110" class="arr" marker-end="url(#arrow)"/>

<!-- 5.2 Read inputs -->
<g class="c-coral">
<rect x="60" y="1112" width="60" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="90" y="1140" text-anchor="middle" dominant-baseline="central">5.2</text>
</g>
<g class="c-teal">
<rect x="150" y="1112" width="210" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="255" y="1132" text-anchor="middle" dominant-baseline="central">Generate Study — read inputs</text>
<text class="ts" x="255" y="1150" text-anchor="middle" dominant-baseline="central">GET /api/configs, /api/videos</text>
</g>
<path d="M360 1128 L385 1128 L385 1125 L404 1125" class="arr" marker-end="url(#arrow)"/>
<path d="M360 1152 L385 1152 L385 1155 L404 1155" class="arr" marker-end="url(#arrow)"/>
<g class="c-blue">
<rect x="410" y="1112" width="200" height="26" rx="6" stroke-width="0.5"/>
<text class="ts" x="510" y="1125" text-anchor="middle" dominant-baseline="central">D1 — configs (SELECT)</text>
</g>
<g class="c-blue">
<rect x="410" y="1142" width="200" height="26" rx="6" stroke-width="0.5"/>
<text class="ts" x="510" y="1155" text-anchor="middle" dominant-baseline="central">D1 — videos (SELECT)</text>
</g>
<text class="ts" x="150" y="1186">Note: attention checks were fetched on page load → D1 attentioncheck SELECT</text>
<line x1="90" y1="1168" x2="90" y2="1204" class="arr" marker-end="url(#arrow)"/>

<!-- 5.3 Create study -->
<g class="c-coral">
<rect x="60" y="1206" width="60" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="90" y="1228" text-anchor="middle" dominant-baseline="central">5.3</text>
</g>
<g class="c-teal">
<rect x="150" y="1206" width="210" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="255" y="1224" text-anchor="middle" dominant-baseline="central">Create study</text>
<text class="ts" x="255" y="1240" text-anchor="middle" dominant-baseline="central">POST /api/studies → study IDs</text>
</g>
<line x1="360" y1="1228" x2="404" y2="1228" class="arr" marker-end="url(#arrow)"/>
<g class="c-blue">
<rect x="410" y="1206" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="1224" text-anchor="middle" dominant-baseline="central">D1 — studies</text>
<text class="ts" x="510" y="1240" text-anchor="middle" dominant-baseline="central">INSERT</text>
</g>
<line x1="90" y1="1250" x2="90" y2="1264" class="arr" marker-end="url(#arrow)"/>

<!-- 5.4 Build page list -->
<g class="c-coral">
<rect x="60" y="1266" width="60" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="90" y="1294" text-anchor="middle" dominant-baseline="central">5.4</text>
</g>
<g class="c-purple">
<rect x="150" y="1266" width="460" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="380" y="1286" text-anchor="middle" dominant-baseline="central">generate*.js — runs in the browser</text>
<text class="ts" x="380" y="1304" text-anchor="middle" dominant-baseline="central">in: CSV + config + videos + study IDs + attention checks  →  out: page list</text>
</g>
<line x1="90" y1="1322" x2="90" y2="1336" class="arr" marker-end="url(#arrow)"/>

<!-- 5.5 Save pages -->
<g class="c-coral">
<rect x="60" y="1338" width="60" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="90" y="1360" text-anchor="middle" dominant-baseline="central">5.5</text>
</g>
<g class="c-teal">
<rect x="150" y="1338" width="210" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="255" y="1356" text-anchor="middle" dominant-baseline="central">Save pages</text>
<text class="ts" x="255" y="1372" text-anchor="middle" dominant-baseline="central">POST /api/pages</text>
</g>
<line x1="360" y1="1360" x2="404" y2="1360" class="arr" marker-end="url(#arrow)"/>
<g class="c-blue">
<rect x="410" y="1338" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="1356" text-anchor="middle" dominant-baseline="central">D1 — pages</text>
<text class="ts" x="510" y="1372" text-anchor="middle" dominant-baseline="central">INSERT</text>
</g>

<rect x="40" y="1410" width="600" height="92" rx="12" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 4"/>
<text class="th" x="60" y="1434">Study ready — served later by the separate `api` worker</text>
<text class="ts" x="60" y="1456">POST /api/start-study — claim a 'new' study, mark it 'started'</text>
<text class="ts" x="60" y="1474">GET  /api/study — return study + pages + videos</text>
<text class="ts" x="60" y="1492">POST /api/finish-study — record the results</text>
</svg>
